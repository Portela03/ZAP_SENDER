<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Sender — Criar conta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,.12);
      padding: 2.5rem 2rem;
    }
    .wa-icon {
      width: 56px;
      height: 56px;
      background: #25d366;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
    }
    .wa-icon svg { width: 32px; height: 32px; fill: white; }
    .btn-wa { background: #25d366; color: #fff; border: none; font-weight: 600; }
    .btn-wa:hover { background: #1dae52; color: #fff; }
  </style>
</head>
<body>
  <div class="login-card bg-white">
    <div class="wa-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.857L.057 23.882a.5.5 0 0 0 .638.608l6.258-1.638A11.943 11.943 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.942 0-3.76-.523-5.32-1.432l-.38-.223-3.938 1.031 1.052-3.827-.247-.395A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
      </svg>
    </div>

    <h5 class="text-center fw-bold mb-1">WhatsApp Sender</h5>
    <p class="text-center text-muted small mb-4">Criar nova conta</p>

    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <input
          type="text"
          name="username"
          class="form-control form-control-lg"
          placeholder="Nome de usuário"
          autocomplete="username"
          autofocus
          required
          minlength="3"
        >
      </div>
      <div class="mb-3">
        <input
          type="password"
          name="password"
          class="form-control form-control-lg"
          placeholder="Senha (mín. 6 caracteres)"
          autocomplete="new-password"
          required
          minlength="6"
        >
      </div>
      <div class="mb-4">
        <input
          type="password"
          name="confirm"
          class="form-control form-control-lg"
          placeholder="Confirmar senha"
          autocomplete="new-password"
          required
        >
      </div>
      <button type="submit" class="btn btn-wa w-100 btn-lg">
        Criar conta
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center text-muted small mb-0">
      Já tem conta? <a href="/login" class="text-decoration-none fw-semibold" style="color:#25d366;">Entrar</a>
    </p>
  </div>
</body>
</html>
